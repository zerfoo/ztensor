# Engine-parity Spark pod for the DGX GB10 (zerfoo ADR 091, plan T1.2).
#
# Runs the GPU-gated tests in testing/parity: the full gradcheck-registry
# CPU-f32 vs GPU-f32 comparison under both arena-stress schedules (small
# arena, poison-on-reset) plus the GPU red-proof fixture pair. Per-schedule
# JSON reports are written to the mounted hostPath. Submit via the Spark
# HTTP API (http://192.168.86.250:8080) -- never via interactive ssh. See
# README.md in this directory for the full procedure.
#
# Spark v1.13.1 mangles YAML literal block scalars in args (a bare `|` leaks
# to bash), so run.sh is delivered base64-encoded as a single-line flow arg
# (the issue-118 manifest convention; docs/devlog.md 2026-06-07):
#   B64=$(base64 -i scripts/parity/run.sh | tr -d '\n')
#   then substitute <BASE64> below before submitting.
#
# Before submitting:
#   1. Replace RUNID in metadata.name (short git SHA or timestamp; Spark
#      rejects duplicate pod names) and <BASE64> with the encoded run.sh.
#   2. mkdir -p /home/ndungu/parity/RUNID on the DGX (report hostPath).
#   3. GPU jobs on the GB10 MUST serialize -- check GET /api/v1/resources.
apiVersion: v1
kind: Pod
metadata:
  name: ztensor-parity-RUNID
  labels:
    app: ztensor-test
spec:
  restartPolicy: Never
  containers:
    - name: parity
      image: docker.io/library/golang:1.26-bookworm
      args: ["bash", "-c", "echo <BASE64> > /tmp/r.b64; base64 -d /tmp/r.b64 > /tmp/run.sh; bash /tmp/run.sh"]
      env:
        - name: LD_LIBRARY_PATH
          value: /opt/zerfoo/lib:/usr/local/cuda/lib64
        - name: ZTENSOR_REF
          value: main
        - name: ZTENSOR_PARITY_REPORT_DIR
          value: /reports
      resources:
        limits:
          # Every pod must carry a memory limit (unbounded pods can OOM the
          # DGX host). The harness itself is tiny; the headroom is for the
          # Go toolchain + CUDA context.
          memory: 16Gi
          cpu: "4"
          nvidia.com/gpu: "1"
      volumeMounts:
        - name: cuda
          mountPath: /usr/local/cuda
          readOnly: true
        - name: zerfoo-lib
          mountPath: /opt/zerfoo/lib
          readOnly: true
        - name: reports
          mountPath: /reports
  volumes:
    - name: cuda
      hostPath:
        path: /usr/local/cuda
        type: Directory
    - name: zerfoo-lib
      hostPath:
        path: /opt/zerfoo/lib
        type: Directory
    - name: reports
      hostPath:
        path: /home/ndungu/parity/RUNID
        type: Directory
