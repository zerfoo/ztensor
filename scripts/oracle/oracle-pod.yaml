# PyTorch-oracle Spark pod for the DGX GB10 (zerfoo ADR 091, plan T1.3).
#
# Replays the ztensor case bundles in PyTorch inside the pinned NGC container
# and writes report.json next to the bundles. Submit via the Spark HTTP API
# (http://192.168.86.250:8080) -- never via interactive ssh. See README.md in
# this directory for the full procedure.
#
# Before submitting:
#   1. Replace RUNID in metadata.name and the hostPath with your run id
#      (short git SHA or timestamp; Spark rejects duplicate pod names).
#   2. Stage /home/ndungu/oracle/RUNID/ on the DGX with:
#        bundles/        (from oracle-gen)
#        run_oracle.py   (this directory)
#
# GPU jobs on the GB10 MUST serialize -- check `GET /api/v1/resources` first.
apiVersion: v1
kind: Pod
metadata:
  name: ztensor-oracle-RUNID
spec:
  restartPolicy: Never
  containers:
    - name: oracle
      # Pinned NGC tag (arm64, sm_121) -- the same image as Wolf's PyTorch
      # reference benchmark. The runner needs no network: stdlib+numpy+torch
      # are all in the image.
      image: nvcr.io/nvidia/pytorch:26.02-py3
      command: ["python", "/work/run_oracle.py"]
      args:
        - "--bundles"
        - "/work/bundles"
        - "--report"
        - "/work/report.json"
        - "--device"
        - "cuda"
      resources:
        limits:
          nvidia.com/gpu: "1"
          # Unified memory on the GB10; the bundles are tiny, but every pod
          # must carry a memory limit (unbounded pods can OOM the DGX host).
          memory: "8Gi"
      volumeMounts:
        - name: work
          mountPath: /work
  volumes:
    - name: work
      hostPath:
        path: /home/ndungu/oracle/RUNID
        type: Directory
