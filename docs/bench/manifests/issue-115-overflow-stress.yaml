# Issue #115 GB10 validation pod (guarded).
#
# Clones the ztensor fix branch and runs the arena overflow stress test on the
# GB10. TestArenaPool_OverflowStress_GPU sets a real engine stream as the arena
# overflow stream, then issues many allocations that overflow a 1 MiB arena
# (sizes 48 B .. 4 MiB, 100 rounds, freed each round). Each overflow goes through
# cudaMallocAsync; pre-fix this path was a synchronous cudaMalloc that
# page-fault-thrashed GB10 unified memory and froze training. The test syncs the
# stream at the end -- a wedge would never reach that point.
#
# Spark drops container stdout for completed pods, so correctness is encoded in
# the EXIT CODE: the script exits non-zero unless the GPU test PASSED (a
# CUDA-unavailable SKIP is a hard failure -- we require real-hardware validation).
#
# Spark v1.13.1 mangles YAML literal block scalars in args (a bare `|` leaks to
# bash). Deliver this script base64-encoded as a single-line flow arg instead:
#   B64=$(base64 -i run.sh | tr -d '\n')
#   args: ["bash","-c","echo $B64 > /tmp/r.b64; base64 -d /tmp/r.b64 > /tmp/run.sh; bash /tmp/run.sh"]
# See docs/devlog.md 2026-06-07 for the gotcha. The script body:
#
#   set -euo pipefail
#   export GOTOOLCHAIN=auto
#   export LD_LIBRARY_PATH=/opt/zerfoo/lib:/usr/local/cuda/lib64
#   mkdir -p /work && cd /work
#   git clone --depth 1 --branch fix/issue-115-async-arena-overflow https://github.com/zerfoo/ztensor.git
#   cd ztensor
#   echo "HEAD: $(git rev-parse HEAD)"
#   set +e
#   go test ./internal/cuda/ -run TestArenaPool_OverflowStress_GPU -v -timeout 180s > /tmp/out.txt 2>&1
#   code=$?
#   set -e
#   cat /tmp/out.txt
#   grep -q -- '--- PASS: TestArenaPool_OverflowStress_GPU' /tmp/out.txt || { echo FATAL: not PASS; exit 3; }
#   grep -q -- '--- SKIP: TestArenaPool_OverflowStress_GPU' /tmp/out.txt && { echo FATAL: SKIPPED no CUDA; exit 4; }
#   test "$code" -eq 0 || { echo FATAL: go test exit $code; exit "$code"; }
#   echo VALIDATION_OK: arena async overflow stress passed on GB10
#
apiVersion: v1
kind: Pod
metadata:
  name: ztensor-issue115-overflow-stress
  labels:
    app: ztensor-test
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: docker.io/library/golang:1.26-bookworm
      args: ["bash", "-c", "echo <BASE64> > /tmp/r.b64; base64 -d /tmp/r.b64 > /tmp/run.sh; bash /tmp/run.sh"]
      env:
        - name: LD_LIBRARY_PATH
          value: /opt/zerfoo/lib:/usr/local/cuda/lib64
      resources:
        limits:
          memory: 16Gi
          cpu: "4"
          nvidia.com/gpu: "1"
      volumeMounts:
        - name: cuda
          mountPath: /usr/local/cuda
          readOnly: true
        - name: zerfoo-lib
          mountPath: /opt/zerfoo/lib
          readOnly: true
  volumes:
    - name: cuda
      hostPath:
        path: /usr/local/cuda
        type: Directory
    - name: zerfoo-lib
      hostPath:
        path: /opt/zerfoo/lib
        type: Directory
